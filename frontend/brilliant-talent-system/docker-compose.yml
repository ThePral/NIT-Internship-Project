
services:
  next-app:
    image: node:22.15.0
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run build && npm start"
    # environment:
    #   - NODE_ENV=development
    #   - WATCHPACK_POLLING=true
    #   - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
